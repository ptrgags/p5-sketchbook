<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      language="javascript"
      type="text/javascript"
      src="../libraries/p5.min.js"
    ></script>
    <script type="module">
      import { sketch } from "./WakingHoursClock.js";
      import "../sketchlib/sketchbook-navbar.js";
      const p5_sketch = new p5(sketch, "sketch");
    </script>
    <link rel="stylesheet" href="../styles/layout.css" />
  </head>
  <body>
    <sketchbook-navbar></sketchbook-navbar>
    <div class="container">
      <h1>Waking Hours Clock (2026-06)</h1>
      <div class="sketch">
        <canvas id="sketch-canvas" width="500" height="700"></canvas>
      </div>
      <div class="description">
        <p>
          This clock is less about telling time, and more about understanding
          one's sleep/wake cycle.
        </p>
        <p>
          For this first iteration, the clock is hard-coded to my (ideal)
          schedule of waking up at 6 and going to bed at 10.
        </p>
      </div>
    </div>
  </body>
</html>
